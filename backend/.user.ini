; Deshabilitar todas las optimizaciones de InfinityFree
output_buffering = Off
zlib.output_compression = Off
implicit_flush = On

; Deshabilitar filtros de salida
output_handler = 

; Configuración PHP adicional
max_execution_time = 300
max_input_time = 300
memory_limit = 256M
post_max_size = 50M
upload_max_filesize = 50M

; Headers para evitar caché
session.cache_limiter = nocache

; Deshabilitar cualquier modificación de salida
disable_functions = 